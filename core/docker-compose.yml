networks:
  crypto:
    name: crypto

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  crypto-nginx:
    image: nginx:1.27-alpine
    container_name: crypto-nginx
    command: /bin/sh -c "nginx -g 'daemon off;'"
    logging: *default-logging
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ../front/dist:/var/www/html:ro
    ports:
      - "80:80"
    networks:
      - crypto
    extra_hosts:
      - 'host.docker.internal:host-gateway'
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: crypto-clickhouse
    logging: *default-logging
    ports:
      - "8123:8123" # HTTP интерфейс (для интеграции с Python, Grafana)
      - "9000:9000" # Нативный протокол (для сверхбыстрой записи и clickhouse-client)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./init-scripts:/docker-entrypoint-initdb.d
    restart: always
    environment:
      - CLICKHOUSE_USER=user
      - CLICKHOUSE_PASSWORD=pass
    # Настройки для повышения производительности при работе в Docker
    cap_add:
      - SYS_NICE
      - NET_ADMIN
      - IPC_LOCK

volumes:
  clickhouse_data:
    driver: local
